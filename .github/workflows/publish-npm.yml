# Publishes via npm trusted publishing (OIDC). No NPM_TOKEN.
# Configure once on npm: package @xirconsss/zero-mock → Settings → Trusted publishing → GitHub Actions.
# Workflow filename here must match npm exactly: publish-npm.yml
# See https://docs.npmjs.com/trusted-publishers
name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.14"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (trusted publishing needs CLI >= 11.5.1)
        run: npm install -g npm@^11.5.1 && npm --version

      - run: npm ci

      - run: npm run build

      - name: Publish to npm via OIDC
        run: npm publish
